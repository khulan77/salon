# Render Blueprint — deploy Lumière with a persistent disk so the JSON store
# and uploaded images survive restarts/redeploys.
#
# Usage: push this repo to GitHub, then in Render → "New +" → "Blueprint" and
# point it at the repo. Fill the env vars marked sync:false in the dashboard.
services:
  - type: web
    name: lumiere-salon
    runtime: node
    plan: starter # persistent disks require a paid instance (starter is cheapest)
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    disk:
      name: lumiere-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: ADMIN_EMAILS
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
